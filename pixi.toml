[workspace]
authors = ["Thadryan <thadryan@protonmail.com>"]
channels = ["conda-forge"]
name = "DigestTechPaperSkill"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
check = "python -m py_compile scripts/*.py scripts/parsers/*.py"

watch = { cmd = [
    "watchexec", "-r",
    "rsync", "-avz", "--delete",
    "--exclude='.pixi'", "--exclude='__pycache__'", "--exclude='*.pyc'",
    "--exclude='.egg-info'", "--exclude='_build'",
    "--exclude='.git'", "--exclude='.opencode/node_modules/'",
    "--include='*/'", "--include='*.py'", "--include='*.md'", "--include='*.toml'",
    "--include='*.json'", "--include='*.ipynb'", "--include='*.sh'", "--exclude='*'", "./", "/mnt/Workspace/Pygester"
] }

# Foffano
test-foffano = """
python scripts/process-pdf.py \
  'assets/Foffano et al. - 2023 - Conformal Off-Policy Evaluation in Markov Decision Processes.pdf' \
  --out runs/foffano-run
"""

test-foffano-enrichment-true = """
python scripts/process-pdf.py \
  'assets/Foffano et al. - 2023 - Conformal Off-Policy Evaluation in Markov Decision Processes.pdf' \
  --out runs/foffano-true \
  --formula-enrichment true
"""

test-foffano-enrichment-false = """
python scripts/process-pdf.py \
  'assets/Foffano et al. - 2023 - Conformal Off-Policy Evaluation in Markov Decision Processes.pdf' \
  --out runs/foffano-false \
  --formula-enrichment false
"""

# Cortes
test-cortes = """
python scripts/process-pdf.py \
  'assets/Cortes-Gomez et al. - 2025 - Utility-Directed Conformal Prediction A Decision-Aware Framework for Actionable Uncertainty Quantif.pdf' \
  --out runs/cortes-run
"""

test-cortes-enrichment-true = """
python scripts/process-pdf.py \
  'assets/Cortes-Gomez et al. - 2025 - Utility-Directed Conformal Prediction A Decision-Aware Framework for Actionable Uncertainty Quantif.pdf' \
  --out runs/cortes-true \
  --formula-enrichment true
"""

test-cortes-enrichment-false = """
python scripts/process-pdf.py \
  'assets/Cortes-Gomez et al. - 2025 - Utility-Directed Conformal Prediction A Decision-Aware Framework for Actionable Uncertainty Quantif.pdf' \
  --out runs/cortes-false \
  --formula-enrichment false
"""

# A/B comparison
ab-foffano = { depends-on = ["test-foffano-enrichment-false", "test-foffano-enrichment-true"] }
ab-cortes = { depends-on = ["test-cortes-enrichment-false", "test-cortes-enrichment-true"] }

# Cleanup
clean = "rm -rf run run-foffano run-cortes runs"

[dependencies]
python = ">=3.10,<3.13"
pymupdf = ">=1.24.0"
pydantic = ">=2.8.0"
orjson = ">=3.10.0"
pytest = ">=7.0.0"

[pypi-dependencies]
docling = ">=2.91.0"

# gooberpants
